version: 2

models:
  - name: stg_patients
    description: "Cleaned and validated patient records from the source patients table"
    columns:
      - name: patient_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: insurance_type
        tests:
          - not_null
      - name: date_of_birth
        tests:
          - not_null

  - name: stg_providers
    description: "Cleaned provider records from the source providers table"
    columns:
      - name: provider_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: provider_name
        tests:
          - not_null

  - name: stg_appointments
    description: "Cleaned appointment records with derived no-show flag"
    columns:
      - name: appt_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
      - name: provider_id
        tests:
          - not_null

  - name: stg_billing
    description: "Cleaned billing records with calculated collection rate"
    columns:
      - name: billing_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null